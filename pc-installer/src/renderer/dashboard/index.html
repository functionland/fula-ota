<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <title>Fula Node Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      overflow-y: auto;
    }

    .dashboard {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
    }

    .overall-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4ecca3;
    }

    .status-dot.green { background: #4ecca3; }
    .status-dot.yellow { background: #f0c040; }
    .status-dot.red { background: #e94560; }
    .status-dot.blue { background: #64b5f6; }
    .status-dot.grey { background: #666; }

    /* Cards */
    .card {
      background: #16213e;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .badge {
      font-size: 11px;
      background: #0f3460;
      padding: 2px 8px;
      border-radius: 8px;
      font-weight: 400;
      color: #8892b0;
    }

    /* Container list */
    .container-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .container-row {
      display: flex;
      align-items: center;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px 16px;
      gap: 12px;
    }

    .container-name {
      flex: 1;
      font-size: 14px;
      font-family: 'Consolas', 'Courier New', monospace;
    }

    .container-status {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 10px;
    }

    .container-status.running {
      background: rgba(78, 204, 163, 0.15);
      color: #4ecca3;
    }

    .container-status.stopped {
      background: rgba(233, 69, 96, 0.15);
      color: #e94560;
    }

    .container-status.restarting {
      background: rgba(240, 192, 64, 0.15);
      color: #f0c040;
    }

    .btn-sm {
      background: #0f3460;
      color: #e0e0e0;
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-sm:hover { background: #1a4a80; }
    .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-sm.logs-btn { background: #2a2a4a; }
    .btn-sm.logs-btn:hover { background: #3a3a5a; }

    /* Log viewer */
    .log-viewer-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .log-viewer-header select {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 6px;
      padding: 6px 10px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
    }

    .log-output {
      background: #0d0d1a;
      border-radius: 6px;
      padding: 12px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
      max-height: 250px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
      color: #aab2c8;
    }

    /* Health checks */
    .health-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .health-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid #1a1a2e;
    }

    .health-item:last-child { border-bottom: none; }

    .health-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .health-dot.ok { background: #4ecca3; }
    .health-dot.warn { background: #f0c040; }
    .health-dot.fail { background: #e94560; }

    .health-label {
      flex: 1;
      font-size: 13px;
    }

    .health-detail {
      font-size: 12px;
      color: #8892b0;
    }

    /* Plugins */
    .plugin-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .plugin-row {
      display: flex;
      align-items: center;
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px 16px;
      gap: 12px;
    }

    .plugin-info {
      flex: 1;
    }

    .plugin-name {
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
    }

    .plugin-desc {
      font-size: 12px;
      color: #8892b0;
      margin-top: 2px;
    }

    .plugin-status {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 10px;
    }

    .plugin-status.installed {
      background: rgba(78, 204, 163, 0.15);
      color: #4ecca3;
    }

    .plugin-status.available {
      background: rgba(100, 181, 246, 0.15);
      color: #64b5f6;
    }

    /* System info */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 12px 16px;
    }

    .info-label {
      font-size: 11px;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 14px;
      color: #ffffff;
      font-family: 'Consolas', 'Courier New', monospace;
      word-break: break-all;
    }

    /* Refresh button */
    .refresh-btn {
      background: none;
      border: 1px solid #2a2a4a;
      color: #8892b0;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .refresh-btn:hover {
      border-color: #0f3460;
      color: #e0e0e0;
    }

    /* Loading state */
    .loading-text {
      color: #8892b0;
      font-size: 13px;
      font-style: italic;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a2e; }
    ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="header">
      <h1>Fula Node Dashboard</h1>
      <div class="overall-status">
        <div class="status-dot green" id="overall-dot"></div>
        <span id="overall-label">Healthy</span>
        <button class="refresh-btn" id="btn-refresh">Refresh</button>
      </div>
    </div>

    <!-- Containers -->
    <div class="card">
      <h2>Services <span class="badge" id="container-count">0 containers</span></h2>
      <div class="container-list" id="container-list">
        <span class="loading-text">Loading containers...</span>
      </div>
    </div>

    <!-- Log Viewer -->
    <div class="card">
      <h2>Logs</h2>
      <div class="log-viewer-header">
        <select id="log-select">
          <option value="">Select a service...</option>
        </select>
        <button class="btn-sm" id="btn-fetch-logs">Load Logs</button>
      </div>
      <div class="log-output" id="log-output">Select a service and click "Load Logs" to view recent output.</div>
    </div>

    <!-- Health Checks -->
    <div class="card">
      <h2>Health Checks</h2>
      <div class="health-list" id="health-list">
        <span class="loading-text">Running health checks...</span>
      </div>
    </div>

    <!-- Plugins -->
    <div class="card">
      <h2>Plugins</h2>
      <div class="plugin-list" id="plugin-list">
        <span class="loading-text">Loading plugins...</span>
      </div>
    </div>

    <!-- System Info -->
    <div class="card">
      <h2>System Info</h2>
      <div class="info-grid" id="info-grid">
        <div class="info-item">
          <div class="info-label">Data Directory</div>
          <div class="info-value" id="info-datadir">--</div>
        </div>
        <div class="info-item">
          <div class="info-label">Disk Free</div>
          <div class="info-value" id="info-disk">--</div>
        </div>
        <div class="info-item">
          <div class="info-label">Platform</div>
          <div class="info-value" id="info-platform">--</div>
        </div>
        <div class="info-item">
          <div class="info-label">Status</div>
          <div class="info-value" id="info-status">--</div>
        </div>
      </div>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
