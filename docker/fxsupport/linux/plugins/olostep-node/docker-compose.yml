# NOTE: This is the source template. The actual docker-compose.yml used at runtime
# is generated by install.sh, which appends extra_hosts entries from
# custom/blocked-domains.txt to block sensitive domains inside the container.
# Do NOT edit the installed copy directly — edit this template or blocked-domains.txt.

services:
  olostep-node:
    image: olostep/olostep-fx-land:latest
    container_name: olostep-node
    restart: unless-stopped
    working_dir: /data
    command: ["node", "/app/index.js"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: 2
    pids_limit: 200
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 9.9.9.9
    volumes:
      - /home/pi/.internal/plugins/olostep-node/storage:/data
    networks:
      - olostep-isolated
    # extra_hosts: generated by install.sh from custom/blocked-domains.txt

networks:
  olostep-isolated:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: "br-olostep"
